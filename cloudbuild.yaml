steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/demo-repo/private-gke-demo:latest'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/demo-repo/private-gke-demo:latest'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: bash
  args:
    - '-c'
    - |
      gcloud compute ssh dombalevarsha4@bastion-host \
      --zone us-central1-f \
      --command="
      cd ~/Private-GKE &&
      git pull &&
      kubectl apply -f k8s/ &&
      kubectl rollout restart deployment/flask-app
      "

options:
  logging: CLOUD_LOGGING_ONLY